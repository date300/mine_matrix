name: mine_matrix
description: "A professional modern iOS style Mining App"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter

  # UI & Styling
  cupertino_icons: ^1.0.8
  google_fonts: ^6.1.0
  glassmorphism: ^3.0.0
  flutter_screenutil: ^5.9.0
  responsive_framework: ^1.1.1
  
  # Animation & Effects
  flutter_animate: ^4.5.0
  lottie: ^3.1.2
  shimmer: ^3.0.0
  animated_background: ^2.0.0
  percent_indicator: ^4.2.3
  
  # State Management & Utilities
  get: ^4.6.6
  flutter_svg: ^2.0.10+1
  flutter_web3: ^2.1.9 # আপনার ফাইলে এটি আগে থেকেই ছিল

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.1

# অ্যাপ আইকন কনফিগারেশন
flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/icon.png"

flutter:
  uses-material-design: true

  # আপনার প্রোজেক্টে Lottie বা SVG ব্যবহারের জন্য অ্যাসেট ফোল্ডার ডিক্লেয়ার করা হলো
  assets:
    - assets/images/
    - assets/icons/
    - assets/lottie/

  # ফন্ট কনফিগারেশন (যদি কাস্টম ফন্ট ফাইল ব্যবহার করেন)
  # fonts:
  #   - family: SFPro
  #     fonts:
  #       - asset: assets/fonts/SF-Pro-Display-Regular.otf
