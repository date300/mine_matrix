name: mine_matrix
description: "A professional modern iOS style Mining App"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # UI & Styling
  cupertino_icons: ^1.0.8
  google_fonts: ^6.1.0
  glassmorphism: ^3.0.0
  flutter_screenutil: ^5.9.3
  responsive_framework: ^1.1.1

  # Animation & Effects
  flutter_animate: ^4.5.2
  lottie: ^3.1.2
  shimmer: ^3.0.0
  animated_background: ^2.0.0
  percent_indicator: ^4.2.5

  # State Management & Utilities
  get: ^4.7.3
  flutter_svg: ^2.0.10+1
  url_launcher: ^6.3.0

  # Web3 & Wallet Connection
  web3modal_flutter: ^3.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.13.1

# অ্যাপ আইকন কনফিগারেশন
flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/icon.png"

flutter:
  uses-material-design: true

  # অ্যাসেট ফোল্ডার ডিক্লেয়ারেশন
  assets:
    - assets/images/
    - assets/icons/
    - assets/lottie/

  # ফন্ট কনফিগারেশন (যদি থাকে তবে আন-কমেন্ট করুন)
  # fonts:
  #   - family: SFPro
  #     fonts:
  #       - asset: assets/fonts/SF-Pro-Display-Regular.otf

# প্যাকেজ কনফ্লিক্ট সল্যুশন (নাম ঠিক করা হয়েছে: appcheck)
dependency_overrides:
  appcheck: ^0.3.0
