name: Flutter Web Deploy via FTP

on:
  push:
    branches:
      - main

# Node.js এবং রানার এনভায়রনমেন্ট অপ্টিমাইজেশন
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: 🚚 Checkout Code
        uses: actions/checkout@v4

      - name: 💽 Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: 📦 Install Dependencies
        run: flutter pub get

      - name: 🔨 Build Web
        run: flutter build web --release

      - name: 🚀 Deploy via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          port: 21
          local-dir: build/web/
          # আপনার ফাইল যদি public_html এর ভেতরে রাখতে হয়, তবে নিচের লাইনটি '/public_html/' করে দিন
          server-dir: / 
          # সার্ভার TLS সাপোর্ট করে বলে 'loose' ব্যবহার করা হয়েছে যাতে কানেকশন ড্রপ না হয়
          security: loose
          # কানেকশন ঝুলিয়ে রাখা বন্ধ করতে টাইমআউট বাড়ানো হয়েছে (মিলিসেকেন্ডে)
          timeout: 90000 
          # কোনো সমস্যা হলে বিস্তারিত দেখার জন্য
          log-level: verbose
          # অপ্রয়োজনীয় ফাইল বাদ দিতে (ঐচ্ছিক)
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
          # আগের ফাইলগুলো ডিলিট না করে শুধু নতুনগুলো আপডেট করবে
          dangerous-clean-slate: false
