name: Flutter Web Deploy via FTP

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 'stable'

      - name: Install dependencies
        run: flutter pub get

      - name: Build Web
        run: flutter build web

      - name: Deploy via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.ftp.ltcminematrix.com }}
          username: ${{ secrets.mining@web3.ltcminematrix.com }}
          password: ${{ secrets.FTP_PASSWORD }}
          port: 21
          local-dir: build/web/
          server-dir: /ssh/
          dangerous-clean-slate: true
